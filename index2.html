<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💖 Interaktif Cinta</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            pointer-events: none;
            width: 90%;
        }

        .main-text {
            font-size: clamp(1.5rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ff007f, #ff00ff, #ff007f);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 30px rgba(255, 0, 100, 0.5);
            letter-spacing: 2px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            line-height: 1.3;
        }

        .sub-text {
            font-size: clamp(0.8rem, 2.5vw, 1.5rem);
            color: #ff99cc;
            text-shadow: 0 0 20px #ff0040;
            opacity: 0.9;
            letter-spacing: 3px;
        }

        .click-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            pointer-events: none;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="text-container">
        <div class="main-text" id="loveText">TE AMO</div>
        <div class="sub-text">♡ INFINITO ♡</div>
    </div>

    <div class="click-hint">✨ klik hati untuk pesan spesial ✨</div>

    <div id="canvas-container"></div>

    <!-- Library Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // --- KODE THREE.JS UNTUK HATI (GALAXY EFFECT) ---
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 35;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- BUAT PARTIKEL HATI ---
        function getHeartPosition(t, scale = 1) {
            const x = 16 * Math.pow(Math.sin(t), 3) * scale;
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
            return { x, y };
        }

        const particleCount = 3000;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const color1 = new THREE.Color(0xff0040);
        const color2 = new THREE.Color(0xff00ff);
        const color3 = new THREE.Color(0xffaa00);

        for (let i = 0; i < particleCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const scaleHeart = 1.2;
            const pos = getHeartPosition(t, scaleHeart);

            const thickness = 2.5;
            const spread = 0.4;
            
            positions[i*3] = pos.x + (Math.random() - 0.5) * spread;
            positions[i*3+1] = pos.y + (Math.random() - 0.5) * spread;
            positions[i*3+2] = (Math.random() - 0.5) * thickness;

            const mixedColor = color1.clone().lerp(color2, Math.random());
            if (Math.random() > 0.7) mixedColor.lerp(color3, 0.5);
            
            colors[i*3] = mixedColor.r;
            colors[i*3+1] = mixedColor.g;
            colors[i*3+2] = mixedColor.b;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.2, 'rgba(255,200,200,1)');
        gradient.addColorStop(0.5, 'rgba(255,0,100,0.8)');
        gradient.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        const texture = new THREE.CanvasTexture(canvas);

        const material = new THREE.PointsMaterial({
            size: 0.5,
            map: texture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            sizeAttenuation: true
        });

        const heartParticles = new THREE.Points(geometry, material);
        scene.add(heartParticles);

        // --- ANIMASI ---
        function animate() {
            const elapsedTime = performance.now() / 1000;

            heartParticles.rotation.y = elapsedTime * 0.3;
            heartParticles.rotation.x = Math.sin(elapsedTime * 0.2) * 0.1;
            
            const breathScale = 1 + Math.sin(elapsedTime * 0.5) * 0.05;
            heartParticles.scale.set(breathScale, breathScale, breathScale);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <!-- KODE INTERAKTIF -->
    <script>
        const loveText = document.getElementById('loveText');
        
        const messages = [
            "TE AMO",
            "I LOVE YOU",
            "YOU ARE MY WORLD",
            "♡ INFINITO ♡",
            "KAMU CANTIK",
            "MY EVERYTHING",
            "You is my favorite people in the world",
            "I'm very lucky to have you girlfriend",
            "KAMU SEMPURNA",
            "AKU SAYANG KAMU",
            "FOREVER YOURS",
            "MY SOULMATE 💖"
        ];
        
        let index = 0;

        document.getElementById('canvas-container').addEventListener('click', function() {
            index = (index + 1) % messages.length;
            loveText.textContent = messages[index];
            
            loveText.style.animation = 'none';
            setTimeout(() => {
                loveText.style.animation = 'gradientShift 3s ease infinite';
            }, 100);
        });
    </script>

</body>
</html>
